<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>FORMULARIO IMC</title>
  </head>
  <body>
    <header>
      <nav id="botones">
        <a id="navegacion" href="index.html">VOLVER A PRINCIPAL</a>
      </nav>
    </header>
    <form id="formularioPersonas">
      <input
        class="agregarValor"
        type="text"
        id="nombre"
        placeholder="Piedra"
        required
      />
      <input
        class="agregarValor"
        type="text"
        id="apellido"
        placeholder="Sanchez"
        required
      />
      <input
        class="agregarValor"
        type="number"
        id="edad"
        placeholder="Edad"
        min="10"
        max="100"
        required
      />
      <input
        class="agregarValor"
        type="number"
        id="altura"
        placeholder="Altura"
        min="150"
        max="230"
        required
      />
      <input
        class="agregarValor"
        type="text"
        id="peso"
        placeholder="Peso"
        min="10"
        max="250"
        required
      />

      <button class="botonValor" type="submit">Agregar</button>
      <button class="botonValor" type="reset">Deshacer</button>
    </form>

    <table id="tablaPersonas">
      <thead>
        <tr>
          <th>nombre</th>
          <th>Apellido</th>
          <th>Edad</th>
          <th>Altura</th>
          <th>Peso</th>
          <th>IMC</th>
        </tr>
      </thead>
      <tbody id="cuerpoTabla"></tbody>
    </table>

    <script src="personas.js"></script>
  </body>
</html>
